<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — STIC</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#222;font-size:15px}
.header{background:linear-gradient(135deg,#1a3a5c,#2563a8);color:white;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}
.btn-refresh{background:rgba(255,255,255,.2);border:none;color:white;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px}
.tabs{display:flex;background:white;border-bottom:2px solid #e0e0e0;overflow-x:auto}
.tab-btn{padding:12px 18px;border:none;background:none;cursor:pointer;font-size:14px;font-family:'Sarabun',sans-serif;color:#666;font-weight:500;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab-btn.active{color:#1a3a5c;font-weight:700;border-bottom-color:#1a3a5c}
.content{padding:16px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}

/* Order cards */
.order-card{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #d1d5db}
.order-card.urgent{border-left-color:#dc2626}
.order-card.medium{border-left-color:#d97706}
.order-card.normal{border-left-color:#16a34a}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.order-name{font-size:15px;font-weight:700;color:#1a3a5c}
.order-code{font-size:11px;color:#888;font-family:monospace}
.urgency-badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;white-space:nowrap}
.u-ด่วน{background:#fee2e2;color:#991b1b}
.u-เร่ง{background:#fef9c3;color:#92400e}
.u-ปกติ{background:#d1fae5;color:#065f46}
.order-detail{font-size:13px;color:#555;margin-bottom:12px;line-height:1.8}
.order-detail span{font-weight:600;color:#222}
.order-actions{display:flex;gap:8px}
.btn-confirm{flex:1;background:#16a34a;color:white;border:none;border-radius:8px;padding:10px;font-size:14px;font-family:'Sarabun',sans-serif;font-weight:700;cursor:pointer}
.btn-reject{background:white;color:#dc2626;border:1.5px solid #dc2626;border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Sarabun',sans-serif;cursor:pointer}
.btn-confirm:hover{background:#15803d}
.empty{text-align:center;color:#aaa;padding:40px;font-size:15px}
.loading{text-align:center;color:#888;padding:40px}
.badge-count{display:inline-block;background:#dc2626;color:white;border-radius:10px;font-size:11px;padding:1px 7px;margin-left:4px}

/* History table */
.hist-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.hist-filter input,.hist-filter select{padding:8px 11px;border:1.5px solid #d1d5db;border-radius:7px;font-size:13px;font-family:'Sarabun',sans-serif}
.tbl-wrap{overflow-x:auto}
.hist-tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
.hist-tbl th{background:#1a3a5c;color:white;padding:9px 10px;font-weight:600;font-size:12px;text-align:center;border:1px solid #c8d6e5;white-space:nowrap}
.hist-tbl td{padding:8px 10px;border:1px solid #e5e7eb;vertical-align:middle;text-align:center}
.hist-tbl tr.group-sep td{border-top:2px solid #2563a8}
.hist-tbl .td-left{text-align:left}
.hist-tbl .td-cust{font-weight:700;color:#1a3a5c;text-align:left}
.hist-tbl .td-name{text-align:left;color:#374151}
.hist-tbl tr:hover td{background:#f8fbff}
.hist-tbl tr.summary-row td{background:#1a3a5c;color:white;font-weight:700;border:1px solid #0f2844}
.hist-tbl tr.summary-row:hover td{background:#1a3a5c}
.status-done{color:#16a34a;font-weight:700}
.status-rejected{color:#dc2626;font-weight:700}

/* Stock tab */
.card{background:white;border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:0 1px 5px rgba(0,0,0,.09)}
.card-title{font-size:16px;font-weight:700;color:#1a3a5c;margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:13px;color:#555;padding:9px 13px;background:#f8fbff;border-radius:8px;margin-bottom:12px}
.ld{width:13px;height:13px;border-radius:3px;display:inline-block;border:1px solid #ccc;margin-right:4px;vertical-align:middle}
.stk-tbl{border-collapse:collapse;font-size:13px;table-layout:fixed}
.stk-tbl th,.stk-tbl td{border:1px solid #c8d6e5}
.th-corner{background:#1a3a5c;color:white;padding:7px 10px;font-weight:700;font-size:12px;text-align:center;white-space:nowrap}
.th-col{background:#1a3a5c;color:white;padding:4px 2px;font-size:13px;text-align:center;white-space:nowrap;width:76px}
.td-row{background:#f0f5ff;font-weight:700;padding:0 10px;text-align:center;color:#1a3a5c;border-right:2px solid #c8d6e5;white-space:nowrap;font-size:13px}
.stk-cell{position:relative;width:76px;height:52px;text-align:center;vertical-align:middle;padding:0;cursor:default;overflow:hidden}
.c-ok{background:#d1fae5}.c-low{background:#fef9c3}.c-out{background:#fee2e2}.c-blocked{background:#6b7280}
.stk-v{display:block;font-size:16px;font-weight:700;color:#1a3a5c;line-height:1;margin-top:10px}
.code-v{display:block;font-size:9px;color:#6b7280;margin-top:2px;font-family:monospace;line-height:1}
.type-nav-wrap{overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.type-nav{display:flex;gap:6px;min-width:max-content}
.type-btn-stk{padding:6px 15px;border:1.5px solid #c8d6e5;border-radius:20px;background:white;cursor:pointer;font-size:13px;font-family:'Sarabun',sans-serif;color:#555;transition:all .12s;white-space:nowrap}
.type-btn-stk:hover{border-color:#2563a8;color:#2563a8}
.type-btn-stk.active{background:#1a3a5c;color:white;border-color:#1a3a5c}
.type-panel{display:none}.type-panel.active{display:block}
.tbadge{display:inline-block;font-size:10px;border-radius:10px;padding:1px 6px;margin-left:4px;background:rgba(0,0,0,.12)}
.tbadge.has{background:#16a34a;color:white}
.type-btn-stk.active .tbadge{background:rgba(255,255,255,.25)}
.type-btn-stk.active .tbadge.has{background:rgba(255,255,255,.9);color:#065f46}
.nut-group-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:950px){.nut-group-grid{grid-template-columns:1fr}}
.nut-sub-title{font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:6px;padding:5px 10px;background:#f0f5ff;border-radius:6px;border-left:3px solid #1a3a5c;display:block}
.badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge.ok{background:#d1fae5;color:#065f46}.badge.low{background:#fef9c3;color:#92400e}.badge.out{background:#fee2e2;color:#991b1b}
table.list{width:100%;border-collapse:collapse;font-size:14px}
table.list th{background:#1a3a5c;color:white;padding:10px;text-align:left;font-weight:600;white-space:nowrap;font-size:13px}
table.list td{padding:9px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
table.list tr:hover td{background:#f8fbff}
.search-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.search-row input,.search-row select{padding:9px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;font-family:'Sarabun',sans-serif;flex:1;min-width:130px}
.search-row input:focus,.search-row select:focus{outline:none;border-color:#2563a8}
.toast{position:fixed;top:20px;right:20px;background:#1a3a5c;color:white;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>🔧 Admin — STIC</h1>
  <button class="btn-refresh" onclick="loadAll()">🔄 รีเฟรช</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('stock',this)">📋 สต็อค</button>
  <button class="tab-btn" onclick="switchTab('pending',this)">รอยืนยัน <span class="badge-count" id="pendingCount">0</span></button>
  <button class="tab-btn" onclick="switchTab('history',this)">ประวัติ</button>
</div>

<div class="content">

  <!-- Tab: สต็อค -->
  <div class="tab-panel active" id="tab-stock">
    <div class="card">
      <div class="card-title">📋 ตารางสต็อค (Matrix View)
        <button onclick="loadStock()" style="background:#e5e7eb;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif">🔄 รีเฟรช</button>
      </div>
      <div class="legend">
        <b>ตำนาน:</b>
        <span><span class="ld" style="background:#d1fae5"></span>ปกติ (≥20)</span>
        <span><span class="ld" style="background:#fef9c3"></span>น้อย (1–19)</span>
        <span><span class="ld" style="background:#fee2e2"></span>หมด</span>
        <span><span class="ld" style="background:#6b7280"></span>ไม่มีการผลิต</span>
      </div>
      <div class="type-nav-wrap"><div class="type-nav" id="stk-type-nav"></div></div>
      <div id="stk-matrix-panels"><div class="loading">⏳ กำลังโหลดสต็อค...</div></div>
    </div>
    <div class="card">
      <div class="card-title">รายการสินค้าทั้งหมด <span style="font-size:13px;font-weight:400;color:#888" id="stk-list-count"></span></div>
      <div class="search-row">
        <input id="stk-q" type="text" placeholder="🔍 ค้นหารหัส / ประเภท / ขนาด..." oninput="renderStockList()">
        <select id="stk-ftype" onchange="renderStockList()"><option value="">ทุกประเภท</option></select>
        <select id="stk-fstat" onchange="renderStockList()">
          <option value="">ทุกสถานะ</option>
          <option value="ok">ปกติ</option>
          <option value="low">น้อย</option>
          <option value="out">หมด</option>
        </select>
      </div>
      <div class="tbl-wrap">
        <table class="list"><thead><tr>
          <th>รหัสสินค้า</th><th>ประเภท</th><th>ขนาด</th><th>ยาว</th>
          <th style="text-align:right">สต็อค</th><th>หน่วย</th><th>สถานะ</th>
        </tr></thead><tbody id="stk-list-tbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- Tab: รอยืนยัน -->
  <div class="tab-panel" id="tab-pending">
    <div id="pendingList"><div class="loading">⏳ กำลังโหลด...</div></div>
  </div>

  <!-- Tab: ประวัติ -->
  <div class="tab-panel" id="tab-history">
    <div class="hist-filter">
      <input type="text" id="hist-q" placeholder="🔍 ค้นหาชื่อลูกค้า / สินค้า..." oninput="renderHistory()">
      <select id="hist-urgency" onchange="renderHistory()">
        <option value="">ทุกความเร่งด่วน</option>
        <option value="ด่วน">🔴 ด่วน</option>
        <option value="เร่ง">🟡 เร่ง</option>
        <option value="ปกติ">🟢 ปกติ</option>
      </select>
    </div>
    <div class="tbl-wrap">
      <table class="hist-tbl">
        <thead><tr>
          <th>วันที่สั่ง</th>
          <th>ลูกค้า</th>
          <th style="text-align:left;min-width:180px">ชื่อ / ขนาดสินค้า</th>
          <th>กระสอบ</th>
          <th>กล่อง</th>
          <th>ความเร่งด่วน</th>
          <th>สถานะ</th>
        </tr></thead>
        <tbody id="historyTbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxhXa14EfmWnaCrNZmvDIO_FUSLbp4jzgHiGZABIaT8_CpMc9rh0eDcMvutxxhIbpk/exec";

const MATRICES = {"น็อตเหลี่ยมเกลียว W":{"cols":["1/4","5/16","3/8","7/16","1/2"],"rows":["1/2","5/8","3/4","1","1.1/4","1.1/2","1.3/4","2","2.1/2","3","3.1/2","4","5","6"]},"น็อตหัวกลมเกลียว W":{"cols":["1/4","5/16","3/8","1/2"],"rows":["1","1.1/4","1.1/2","2 ค.","2.1/2","3","3.1/2","4","4.1/2","5","5.1/2","6","6.1/2","7","7.1/2","8","8.1/2","9","10","11","12"]},"สกรูเกลียวปล่อย":{"cols":["1/4","5/16","3/8"],"rows":["2","2.1/2","3","3.1/2","4","1.1/2"]},"น็อตเหลี่ยม W (ใหญ่)":{"cols":["5/8 W","3/4 W"],"rows":["1.1/2","2","2.1/2","3","3.1/2","4","4.1/2","5","6"]},"น็อตเหลี่ยม NC (ใหญ่)":{"cols":["5/8 NC","3/4 NC","7/8 NC","1 NC"],"rows":["1.1/2","2 ค.","2.1/2","3","3.1/2","4","4.1/2","5","5.1/2","6","6.1/2","7","8"]},"หัวน็อตมิล":{"cols":["ขาว","ดำ"],"rows":["M3","M4","M5","M6 (p1.0 ขอบ10)","M8 (p1.25 ขอบ12)","M8 (p1.25 ขอบ13)","M10 (p1.25 ขอบ14)","M10 (p1.5 ขอบ14)","M10 (p1.25 ขอบ17)","M10 (p1.5 ขอบ17)","M12 (p1.25 ขอบ17)","M12 (p1.5 ขอบ17)","M12 (p1.75 ขอบ19","M14 (p1.5 ขอบ22)","M14 (p2.0 ขอบ22)","M16 (p1.5 ขอบ24)","M16 (p2.0 ขอบ24)","M18 (p1.5 ขอบ27)","M18 (p2.5 ขอบ27)","M20 (p2.5 ขอบ30)","M22 (p2.5 ขอบ32)","M24"]},"หัวน็อตเกลียวหยาบ NC":{"cols":["STOCK"],"rows":["1/4","5/16","3/8","7/16","1/2","9/16","5/8","3/4","7/8","1"]},"หัวน็อตเกลียวหยาบ NF":{"cols":["STOCK"],"rows":["1/4","5/16","3/8","7/16","1/2","9/16","5/8","3/4"]},"หัวน็อตเกลียว W":{"cols":["STOCK"],"rows":["3/16","1/4 (ขอบ10)","1/4 (ขอบ11)","5/16 (ขอบ12.5)","5/16 (ขอบ14)","3/8","7/16","1/2","5/8","3/4","7/8","1"]},"สกรูมิลขาว":{"cols":["M5","M6","M8","M10","M12"],"rows":["10","12","15","20","25","30","35","40","45","50","55","60","70","80","90","100"]},"น็อตเหลี่ยม NC":{"cols":["1/4","5/16","3/8","7/16","1/2","9/16"],"rows":["1/2","5/8","3/4","1","1.1/4","1.1/2","2","2.1/2","3","3.1/2","4","5","6"]},"น็อตเหลี่ยม NF":{"cols":["1/4","5/16","3/8","7/16","1/2","9/16"],"rows":["1/2","5/8","3/4","1","1.1/4","1.1/2","2","2.1/2","3","3.1/2","4"]},"น็อตแข็ง M6-M16 (ตลอด)":{"cols":["M6 P1.0","M8 P1.25","M10 P1.5","M12 P1.75","M14 P2.0","M16 P2.0"],"rows":["10","12","16","20","25","30","35","40","45","50"]},"น็อตแข็ง M6-M16 (ครึ่ง)":{"cols":["M6 P1.0","M8 P1.25","M10 P1.5","M12 P1.75","M14 P2.0","M16 P2.0"],"rows":["40","45","50","55","60","65","70","75","80","90","100","110","120","130","140","150"]},"น็อตแข็ง M18-M30 (ตลอด)":{"cols":["M18 P2.5","M20 P2.5","M22 P2.5","M24 P3.0","M12 P1.5"],"rows":["40","45","50","60","55","65","25","30","35"]},"น็อตแข็ง M18-M30 (ครึ่ง)":{"cols":["M18 P2.5","M20 P2.5","M22 P2.5","M24 P3.0","M30 P3.5","M12 P1.5"],"rows":["55","60","65","70","75","80","90","100","85","110","120","130","140","150","45","50"]},"น็อตแข็งเกลียวมิล (ตลอด)":{"cols":["M10 P1.25","M12 P1.25","M14 P1.5","M16 P1.5","M18 P1.5"],"rows":["20","25","30","35","40","45","50","55","60"]},"น็อตแข็งเกลียวมิล (ครึ่ง)":{"cols":["M10 P1.25","M12 P1.25","M14 P1.5","M16 P1.5","M18 P1.5"],"rows":["45","50","55","60","65","70","75","80","90","100","40","120"]},"น็อตเหลี่ยม W ไม่ควบหัว":{"cols":["1/4","5/16","3/8","7/16","1/2"],"rows":["1/2","5/8","3/4","1","1.1/4","1.1/2","1.3/4","2","2.1/2","3","3.1/2","4","5","6"]},"น็อตเหลี่ยมเกลียว W (ยาว)":{"cols":["3/8×5","3/8×6","7/16×3.1/2","1/2×5","1/2×6"],"rows":["ครึ่ง","3/4","1","1.1/4"]},"หัวน็อตมิลแข็ง เกรด8":{"cols":["STOCK"],"rows":["M6","M8","M10","M12","M14","M16","M18","M20","M22","M24"]},"Spring Washer":{"cols":["STOCK"],"rows":["M3","M4","M5","M6","M8","M10","M12","M14","M16","M18","M20","M24"]},"หัวน็อตมิลแข็ง OVERSIZE":{"cols":["STOCK"],"rows":["M6","M8","M10","M12","M14","M16","M18","M20","M22","M24"]}};
const TYPES = ["น็อตเหลี่ยมเกลียว W","น็อตหัวกลมเกลียว W","สกรูเกลียวปล่อย","น็อตเหลี่ยม W (ใหญ่)","น็อตเหลี่ยม NC (ใหญ่)","หัวน็อตมิล","หัวน็อตเกลียวหยาบ NC","หัวน็อตเกลียวหยาบ NF","หัวน็อตเกลียว W","สกรูมิลขาว","น็อตเหลี่ยม NC","น็อตเหลี่ยม NF","น็อตแข็ง M6-M16 (ตลอด)","น็อตแข็ง M6-M16 (ครึ่ง)","น็อตแข็ง M18-M30 (ตลอด)","น็อตแข็ง M18-M30 (ครึ่ง)","น็อตแข็งเกลียวมิล (ตลอด)","น็อตแข็งเกลียวมิล (ครึ่ง)","น็อตเหลี่ยม W ไม่ควบหัว","น็อตเหลี่ยมเกลียว W (ยาว)","หัวน็อตมิลแข็ง เกรด8","Spring Washer","หัวน็อตมิลแข็ง OVERSIZE"];
const BOX_TYPES = ["สกรูมิลขาว","น็อตเหลี่ยม NC","น็อตเหลี่ยม NF","น็อตแข็ง M6-M16 (ตลอด)","น็อตแข็ง M6-M16 (ครึ่ง)","น็อตแข็ง M18-M30 (ตลอด)","น็อตแข็ง M18-M30 (ครึ่ง)","น็อตแข็งเกลียวมิล (ตลอด)","น็อตแข็งเกลียวมิล (ครึ่ง)","Spring Washer","หัวน็อตมิลแข็ง OVERSIZE"];
const HUA_NUT = ["หัวน็อตมิล","หัวน็อตเกลียวหยาบ NC","หัวน็อตเกลียวหยาบ NF","หัวน็อตเกลียว W"];
const NC_NF_SM = ["น็อตเหลี่ยม NC","น็อตเหลี่ยม NF"];
const HUA_NUT_ENC = 'HUA_NUT_GROUP';
const NC_NF_SM_ENC = 'NC_NF_SM_GROUP';

let stockMap = {}, allItems = [], historyData = [];
let curEnc = encT(TYPES[0]);

function encT(t){return btoa(encodeURIComponent(t)).replace(/[^a-zA-Z0-9]/g,'');}
function getStock(code){return stockMap[code]||{stock:0};}
function sts(s){return s>=20?'ok':s>0?'low':'out';}
function badge(s){const st=sts(s);return`<span class="badge ${st}">${st==='ok'?'ปกติ':st==='low'?'น้อย':'หมด'}</span>`;}
function getUnit(type){return BOX_TYPES.includes(type)?'กล่อง':'กระสอบ';}

// ---- Tab switching ----
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function loadAll() {
  loadStock();
  loadPending();
  loadHistory();
}

// ---- Stock tab ----
async function loadStock() {
  document.getElementById('stk-matrix-panels').innerHTML = '<div class="loading">⏳ กำลังโหลดสต็อค...</div>';
  try {
    const res = await fetch(API + '?action=getStock');
    const data = await res.json();
    if (data.items) {
      stockMap = {};
      allItems = data.items.map(x => ({ ...x, code: String(x.code).padStart(8,'0') }));
      allItems.forEach(x => { stockMap[x.code] = { stock: Number(x.stock)||0 }; });
      buildStockNav();
      buildMatrix();
      populateTypeFilter();
      renderStockList();
    }
  } catch(e) {
    document.getElementById('stk-matrix-panels').innerHTML = '<div class="empty">❌ โหลดไม่ได้</div>';
  }
}

function buildStockNav() {
  const nav = document.getElementById('stk-type-nav');
  const isHua = HUA_NUT.some(t => encT(t) === curEnc) || curEnc === HUA_NUT_ENC;
  const isNc = NC_NF_SM.some(t => encT(t) === curEnc) || curEnc === NC_NF_SM_ENC;
  let html = '', huaDone = false, ncDone = false;
  TYPES.forEach(t => {
    if (HUA_NUT.includes(t)) {
      if (!huaDone) {
        const has = HUA_NUT.reduce((s,ht)=>s+allItems.filter(x=>x.type===ht&&Number(x.stock)>0).length,0);
        html += `<button class="type-btn-stk ${isHua?'active':''}" data-enc="${HUA_NUT_ENC}" onclick="switchStockType('${HUA_NUT_ENC}')">🔩 หัวน็อต<span class="tbadge ${has>0?'has':''}">${has}</span></button>`;
        huaDone = true;
      }
      return;
    }
    if (NC_NF_SM.includes(t)) {
      if (!ncDone) {
        const has = NC_NF_SM.reduce((s,nt)=>s+allItems.filter(x=>x.type===nt&&Number(x.stock)>0).length,0);
        html += `<button class="type-btn-stk ${isNc?'active':''}" data-enc="${NC_NF_SM_ENC}" onclick="switchStockType('${NC_NF_SM_ENC}')">🎒 น็อตเหลี่ยม NC/NF<span class="tbadge ${has>0?'has':''}">${has}</span></button>`;
        ncDone = true;
      }
      return;
    }
    const has = allItems.filter(x=>x.type===t&&Number(x.stock)>0).length;
    const enc = encT(t);
    const lbl = BOX_TYPES.includes(t)?'📦':'🎒';
    html += `<button class="type-btn-stk ${enc===curEnc?'active':''}" data-enc="${enc}" onclick="switchStockType('${enc}')">${lbl} ${t}<span class="tbadge ${has>0?'has':''}">${has}</span></button>`;
  });
  nav.innerHTML = html;
}

function buildTypeTable(t) {
  const m = MATRICES[t]; if (!m) return '<div class="empty">ไม่มีข้อมูล</div>';
  const catItems = allItems.filter(x => x.type === t);
  let h = '<div style="overflow-x:auto"><table class="stk-tbl"><thead><tr>';
  h += `<th class="th-corner">ยาว \\ ขนาด</th>`;
  m.cols.forEach(c => h += `<th class="th-col">${c}</th>`);
  h += '</tr></thead><tbody>';
  m.rows.forEach(row => {
    h += `<tr><td class="td-row">${row}</td>`;
    m.cols.forEach(col => {
      const it = catItems.find(x => String(x.col)===String(col) && String(x.row)===String(row));
      if (!it) { h += '<td class="stk-cell c-blocked"></td>'; return; }
      const s = getStock(it.code);
      const cls = s.stock>=20?'c-ok':s.stock>0?'c-low':'c-out';
      h += `<td class="stk-cell ${cls}"><span class="stk-v">${s.stock}</span><span class="code-v">${it.code}</span></td>`;
    });
    h += '</tr>';
  });
  return h + '</tbody></table></div>';
}

function buildMatrix() {
  const panels = document.getElementById('stk-matrix-panels');
  panels.innerHTML = '';
  const isHua = HUA_NUT.some(t=>encT(t)===curEnc)||curEnc===HUA_NUT_ENC;
  const isNc = NC_NF_SM.some(t=>encT(t)===curEnc)||curEnc===NC_NF_SM_ENC;
  const huaDiv = document.createElement('div');
  huaDiv.className = 'type-panel'+(isHua?' active':'');
  huaDiv.id = 'mp-'+HUA_NUT_ENC;
  huaDiv.innerHTML = `<div class="nut-group-grid">
    <div><span class="nut-sub-title">หัวน็อตมิล</span>${buildTypeTable('หัวน็อตมิล')}</div>
    <div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><span class="nut-sub-title">หัวน็อตเกลียวหยาบ NC</span>${buildTypeTable('หัวน็อตเกลียวหยาบ NC')}</div>
        <div><span class="nut-sub-title">หัวน็อตเกลียว W</span>${buildTypeTable('หัวน็อตเกลียว W')}</div>
      </div>
      <span class="nut-sub-title">หัวน็อตเกลียวหยาบ NF</span>${buildTypeTable('หัวน็อตเกลียวหยาบ NF')}
    </div></div>`;
  panels.appendChild(huaDiv);
  const ncDiv = document.createElement('div');
  ncDiv.className = 'type-panel'+(isNc?' active':'');
  ncDiv.id = 'mp-'+NC_NF_SM_ENC;
  ncDiv.innerHTML =
    `<span class="nut-sub-title" style="margin-bottom:8px">น็อตเหลี่ยม NC</span>${buildTypeTable('น็อตเหลี่ยม NC')}`+
    `<span class="nut-sub-title" style="margin-top:16px;margin-bottom:8px">น็อตเหลี่ยม NF</span>${buildTypeTable('น็อตเหลี่ยม NF')}`;
  panels.appendChild(ncDiv);
  TYPES.forEach(t => {
    if (HUA_NUT.includes(t)||NC_NF_SM.includes(t)) return;
    const enc = encT(t); const div = document.createElement('div');
    div.className = 'type-panel'+(enc===curEnc?' active':''); div.id = 'mp-'+enc;
    div.innerHTML = buildTypeTable(t); panels.appendChild(div);
  });
}

function switchStockType(enc) {
  curEnc = enc;
  document.querySelectorAll('.type-btn-stk').forEach(b=>b.classList.toggle('active',b.dataset.enc===enc));
  document.querySelectorAll('.type-panel').forEach(p=>p.classList.remove('active'));
  const p = document.getElementById('mp-'+enc); if(p) p.classList.add('active');
}

function populateTypeFilter() {
  const sel = document.getElementById('stk-ftype');
  sel.innerHTML = '<option value="">ทุกประเภท</option>';
  TYPES.forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
}

function renderStockList() {
  const q = document.getElementById('stk-q').value.toLowerCase();
  const ft = document.getElementById('stk-ftype').value;
  const fs = document.getElementById('stk-fstat').value;
  const rows = allItems.filter(x => {
    const s = getStock(x.code).stock;
    if (q && !(x.code+' '+x.type+' '+x.col+' '+x.row).toLowerCase().includes(q)) return false;
    if (ft && x.type !== ft) return false;
    if (fs && sts(s) !== fs) return false;
    return true;
  });
  document.getElementById('stk-list-count').textContent = `(แสดง ${rows.length} จาก ${allItems.length})`;
  const tbody = document.getElementById('stk-list-tbody');
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty">ไม่พบรายการ</div></td></tr>'; return; }
  tbody.innerHTML = rows.map(x => {
    const s = getStock(x.code); const unit = getUnit(x.type);
    return `<tr>
      <td style="font-family:monospace;font-size:13px;font-weight:700;color:#1a3a5c">${x.code}</td>
      <td style="font-size:13px">${x.type}</td><td>${x.col}</td><td>${x.row}</td>
      <td style="text-align:right;font-weight:700;font-size:15px">${s.stock}</td>
      <td><span style="font-size:12px;background:#f3f4f6;padding:2px 8px;border-radius:6px">${unit}</span></td>
      <td>${badge(s.stock)}</td></tr>`;
  }).join('');
}

// ---- Pending tab ----
async function loadPending() {
  try {
    const res = await fetch(API + '?action=getOrders&status=pending');
    const data = await res.json();
    const orders = data.orders || [];
    document.getElementById('pendingCount').textContent = orders.length;
    if (!orders.length) {
      document.getElementById('pendingList').innerHTML = '<div class="empty">✅ ไม่มีคำสั่งซื้อรอยืนยัน</div>';
      return;
    }
    document.getElementById('pendingList').innerHTML = orders.map(o => `
      <div class="order-card ${o.urgency==='ด่วน'?'urgent':o.urgency==='เร่ง'?'medium':'normal'}">
        <div class="order-top">
          <div>
            <div class="order-name">${o.name||o.code}</div>
            <div class="order-code">รหัส: ${o.code}</div>
          </div>
          <span class="urgency-badge u-${o.urgency}">${o.urgency}</span>
        </div>
        <div class="order-detail">
          👤 ลูกค้า: <span>${o.customer}</span><br>
          📦 จำนวน: <span>${o.qty} ${o.unit||'กระสอบ'}</span><br>
          📅 วันที่สั่ง: <span>${o.date||'-'}</span><br>
          ${o.note?'📝 หมายเหตุ: <span>'+o.note+'</span>':''}
        </div>
        <div class="order-actions">
          <button class="btn-confirm" onclick="confirmOrder(${o.row},'${o.code}',${o.qty})">✅ ยืนยัน ตัดสต็อค</button>
          <button class="btn-reject" onclick="rejectOrder(${o.row})">❌ ยกเลิก</button>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('pendingList').innerHTML = '<div class="empty">❌ โหลดไม่ได้</div>';
  }
}

async function confirmOrder(row, code, qty) {
  if (!confirm(`ยืนยันตัดสต็อค ${code} จำนวน ${qty}?`)) return;
  try {
    await fetch(API, { method:'POST', body:JSON.stringify({action:'confirmOrder',row,code,qty}) });
    showToast('✅ ยืนยันและตัดสต็อคแล้ว');
    loadPending(); loadHistory();
  } catch(e) { alert('เกิดข้อผิดพลาด'); }
}

async function rejectOrder(row) {
  if (!confirm('ยืนยันยกเลิกคำสั่งซื้อนี้?')) return;
  try {
    await fetch(API, { method:'POST', body:JSON.stringify({action:'rejectOrder',row}) });
    showToast('❌ ยกเลิกคำสั่งซื้อแล้ว');
    loadPending(); loadHistory();
  } catch(e) { alert('เกิดข้อผิดพลาด'); }
}

// ---- History tab ----
async function loadHistory() {
  try {
    const res = await fetch(API + '?action=getOrders&status=all');
    const data = await res.json();
    historyData = (data.orders||[]).filter(o => o.status !== 'pending').reverse();
    renderHistory();
  } catch(e) {}
}

function fmtDate(raw) {
  if (!raw) return '-';
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear() + 543; // แปลงเป็น พ.ศ.
  const hh = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yyyy} ${hh}.${min} น.`;
}

function renderHistory() {
  const q = document.getElementById('hist-q').value.toLowerCase();
  const fu = document.getElementById('hist-urgency').value;
  let rows = historyData.filter(o => {
    if (q && !(o.customer+' '+(o.name||o.code)).toLowerCase().includes(q)) return false;
    if (fu && o.urgency !== fu) return false;
    return true;
  });

  const tbody = document.getElementById('historyTbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:24px">ยังไม่มีประวัติ</td></tr>';
    return;
  }

  // จัดกลุ่มตามลูกค้า แล้วเรียงภายในกลุ่มตามวันที่
  const byCustomer = {};
  rows.forEach(o => {
    if (!byCustomer[o.customer]) byCustomer[o.customer] = [];
    byCustomer[o.customer].push(o);
  });

  const urgColor = {'ด่วน':'#fee2e2','เร่ง':'#fef9c3','ปกติ':'#d1fae5'};
  const urgText = {'ด่วน':'🔴 ด่วน','เร่ง':'🟡 เร่ง','ปกติ':'🟢 ปกติ'};
  let html = '';
  let totalSack = 0, totalBox = 0;

  Object.entries(byCustomer).forEach(([cust, orders], gi) => {
    let custSack = 0, custBox = 0;
    orders.forEach((o, idx) => {
      const isBox = (o.unit||'กระสอบ') === 'กล่อง';
      const qty = Number(o.qty)||0;
      if (isBox) custBox += qty; else custSack += qty;
      const statusHtml = o.status === 'confirmed'
        ? '<span class="status-done">✅ ยืนยัน</span>'
        : '<span class="status-rejected">❌ ยกเลิก</span>';
      html += `<tr${idx===0?' class="group-sep"':''}>
        <td style="white-space:nowrap">${fmtDate(o.date)}</td>
        <td class="td-cust">${idx===0?cust:''}</td>
        <td class="td-name">${o.name||o.code}</td>
        <td style="font-weight:700;color:#1a3a5c">${!isBox?qty:''}</td>
        <td style="font-weight:700;color:#7c3aed">${isBox?qty:''}</td>
        <td><span style="background:${urgColor[o.urgency]||'#f3f4f6'};padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">${urgText[o.urgency]||o.urgency}</span></td>
        <td>${statusHtml}</td>
      </tr>`;
    });
    // สรุปต่อลูกค้า
    html += `<tr style="background:#f0f5ff">
      <td colspan="3" style="text-align:right;font-size:12px;color:#555;font-style:italic">รวม ${cust}</td>
      <td style="font-weight:700;color:#1a3a5c">${custSack||'-'}</td>
      <td style="font-weight:700;color:#7c3aed">${custBox||'-'}</td>
      <td colspan="2"></td>
    </tr>`;
    totalSack += custSack;
    totalBox += custBox;
  });

  // สรุปทั้งหมด
  html += `<tr class="summary-row">
    <td colspan="3" style="text-align:right">📊 รวมทั้งหมด</td>
    <td>${totalSack} กระสอบ</td>
    <td>${totalBox} กล่อง</td>
    <td colspan="2"></td>
  </tr>`;

  tbody.innerHTML = html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadAll();
setInterval(loadPending, 30000);
</script>
