<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>สั่งสินค้า — STIC</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#222;font-size:15px}

.header{background:linear-gradient(135deg,#1a3a5c,#2563a8);color:white;padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;opacity:.8;margin-top:2px}

.type-nav-wrap{overflow-x:auto;padding:10px 12px;background:white;border-bottom:1px solid #e0e0e0;white-space:nowrap;position:sticky;top:58px;z-index:99}
.type-btn{display:inline-block;padding:6px 14px;border:1.5px solid #d1d5db;border-radius:20px;font-size:13px;font-family:'Sarabun',sans-serif;background:white;color:#555;margin-right:6px;cursor:pointer}
.type-btn.active{background:#1a3a5c;color:white;border-color:#1a3a5c}

.content{padding:12px}
.tbl-wrap{overflow-x:auto;margin-bottom:20px;background:white;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.09);padding:12px}
.type-title{font-size:15px;font-weight:700;color:#1a3a5c;margin-bottom:10px}

table.stk{border-collapse:collapse;font-size:12px}
table.stk th,table.stk td{border:1px solid #c8d6e5}
.th-corner{background:#1a3a5c;color:white;padding:6px 10px;font-weight:700;font-size:11px;text-align:center;white-space:nowrap;min-width:80px}
.th-col{background:#1a3a5c;color:white;padding:4px 2px;font-size:12px;text-align:center;white-space:nowrap;width:70px}
.td-row{background:#f0f5ff;font-weight:700;padding:0 8px;text-align:center;color:#1a3a5c;border-right:2px solid #c8d6e5;white-space:nowrap;font-size:12px;min-width:80px}
.stk-cell{width:70px;height:50px;text-align:center;vertical-align:middle;padding:0;overflow:hidden}
.stk-cell.has{background:#d1fae5;cursor:pointer}
.stk-cell.has:hover{background:#a7f3d0}
.stk-cell.out{background:#fee2e2;cursor:default}
.stk-cell.blocked{background:#e5e7eb}
.cell-tick{font-size:20px;display:block}
.cell-code{font-size:9px;color:#666;font-family:monospace}

.loading{text-align:center;color:#888;padding:40px}
.empty{text-align:center;color:#aaa;padding:20px}

/* Legend */
.legend{display:flex;gap:14px;padding:8px 12px;background:white;border-bottom:1px solid #e0e0e0;font-size:12px;color:#555}
.ld{display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:4px;vertical-align:middle}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.modal-code{font-size:12px;color:#888;font-family:monospace;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:14px;font-weight:600;color:#374151;margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 13px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;font-family:'Sarabun',sans-serif;outline:none}
.field input:focus{border-color:#2563a8}
.urgency-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.urgency-opt{padding:10px 6px;border:1.5px solid #d1d5db;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.urgency-opt.sel-normal{background:#d1fae5;border-color:#16a34a;color:#065f46}
.urgency-opt.sel-medium{background:#fef9c3;border-color:#d97706;color:#92400e}
.urgency-opt.sel-urgent{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.urgency-opt:not(.selected){opacity:.5}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-cancel{flex:1;padding:13px;border:1.5px solid #d1d5db;border-radius:8px;background:white;font-size:15px;font-family:'Sarabun',sans-serif;cursor:pointer;color:#555}
.btn-confirm{flex:2;padding:13px;border:none;border-radius:8px;background:#2563a8;color:white;font-size:15px;font-family:'Sarabun',sans-serif;font-weight:700;cursor:pointer}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:white;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:999;display:none;white-space:nowrap}
.toast.show{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>🛒 สั่งสินค้า STIC</h1>
  <p>กดช่อง ✅ เพื่อสั่งสินค้า</p>
</div>

<div class="legend">
  <span><span class="ld" style="background:#d1fae5;border:1px solid #ccc"></span>✅ มีสินค้า (กดสั่งได้)</span>
  <span><span class="ld" style="background:#fee2e2;border:1px solid #ccc"></span>❌ หมด</span>
  <span><span class="ld" style="background:#e5e7eb;border:1px solid #ccc"></span>— ไม่มีรายการ</span>
</div>

<div class="type-nav-wrap" id="typeNav"></div>

<div class="content" id="content">
  <div class="loading">⏳ กำลังโหลดข้อมูล...</div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalName"></div>
    <div class="modal-code" id="modalCode"></div>
    <div class="field">
      <label>ชื่อลูกค้า *</label>
      <input type="text" id="inputCustomer" placeholder="กรอกชื่อลูกค้า">
    </div>
    <div class="field">
      <label>จำนวน (กก.) *</label>
      <input type="number" id="inputQty" placeholder="0" min="1" step="1">
    </div>
    <div class="field">
      <label>ความเร่งด่วน *</label>
      <div class="urgency-opts">
        <div class="urgency-opt sel-normal selected" onclick="selectUrgency('ปกติ',this)">🟢 ปกติ</div>
        <div class="urgency-opt sel-medium" onclick="selectUrgency('เร่ง',this)">🟡 เร่ง</div>
        <div class="urgency-opt sel-urgent" onclick="selectUrgency('ด่วน',this)">🔴 ด่วน</div>
      </div>
    </div>
    <div class="field">
      <label>หมายเหตุ (ถ้ามี)</label>
      <input type="text" id="inputNote" placeholder="">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalDirect()">ยกเลิก</button>
      <button class="btn-confirm" onclick="submitOrder()">✅ ยืนยันสั่งสินค้า</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxhXa14EfmWnaCrNZmvDIO_FUSLbp4jzgHiGZABIaT8_CpMc9rh0eDcMvutxxhIbpk/exec";

let allItems = [];
let allTypes = [];
let selectedCode = '';
let selectedName = '';
let selectedUrgency = 'ปกติ';

async function loadData() {
  try {
    const res = await fetch(API + '?action=getStock');
    const data = await res.json();
    if (!data.items) throw new Error();

    allItems = data.items.map(p => ({
      ...p,
      code: String(p.code).padStart(8, '0')
    }));

    // group by type
    allTypes = [...new Set(allItems.map(p => p.type))].filter(Boolean);

    buildTypeNav();
    renderAll();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">❌ โหลดไม่ได้ กรุณารีเฟรช</div>';
  }
}

function buildTypeNav() {
  const nav = document.getElementById('typeNav');
  nav.innerHTML = allTypes.map((t, i) =>
    `<button class="type-btn ${i===0?'active':''}" onclick="scrollToType('${t}',this)">${t}</button>`
  ).join('');
}

function scrollToType(type, btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('type-' + type.replace(/\s/g,'_'));
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  allTypes.forEach(type => {
    const items = allItems.filter(p => p.type === type);

    // สร้าง grid จาก col x row
    const cols = [...new Set(items.map(p => p.col))].filter(Boolean).sort();
    const rows = [...new Set(items.map(p => p.row))].filter(Boolean).sort();

    const wrap = document.createElement('div');
    wrap.className = 'tbl-wrap';
    wrap.id = 'type-' + type.replace(/\s/g,'_');

    let html = `<div class="type-title">${type}</div>`;

    if (cols.length && rows.length) {
      // แสดงเป็น grid
      html += '<div style="overflow-x:auto"><table class="stk"><thead><tr>';
      html += `<th class="th-corner">ขนาด / น้ำหนัก</th>`;
      cols.forEach(c => html += `<th class="th-col">${c}</th>`);
      html += '</tr></thead><tbody>';

      rows.forEach(row => {
        html += `<tr><td class="td-row">${row}</td>`;
        cols.forEach(col => {
          const item = items.find(p => p.col === col && p.row === row);
          if (!item) {
            html += `<td class="stk-cell blocked"></td>`;
          } else {
            const hasStock = Number(item.stock) > 0;
            const cls = hasStock ? 'has' : 'out';
            const tick = hasStock ? '✅' : '❌';
            const onclick = hasStock ? `onclick="openModal('${item.code}','${type} ${col} ${row}')"` : '';
            html += `<td class="stk-cell ${cls}" ${onclick}>
              <span class="cell-tick">${tick}</span>
              <span class="cell-code">${item.code}</span>
            </td>`;
          }
        });
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    } else {
      // ถ้าไม่มี col/row แสดงเป็น list
      html += items.map(item => {
        const hasStock = Number(item.stock) > 0;
        const cls = hasStock ? 'has' : 'out';
        const tick = hasStock ? '✅' : '❌';
        const onclick = hasStock ? `onclick="openModal('${item.code}','${item.type}')"` : '';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0" ${onclick}>
          <span style="font-size:13px;color:#1a3a5c;font-weight:600">${item.code}</span>
          <span style="font-size:20px">${tick}</span>
        </div>`;
      }).join('');
    }

    wrap.innerHTML = html;
    content.appendChild(wrap);
  });
}

function openModal(code, name) {
  selectedCode = code;
  selectedName = name;
  selectedUrgency = 'ปกติ';
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalCode').textContent = 'รหัส: ' + code;
  document.getElementById('inputCustomer').value = '';
  document.getElementById('inputQty').value = '';
  document.getElementById('inputNote').value = '';
  document.querySelectorAll('.urgency-opt').forEach(e => e.classList.remove('selected'));
  document.querySelector('.sel-normal').classList.add('selected');
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalBg').classList.remove('open');
}

function selectUrgency(val, el) {
  selectedUrgency = val;
  document.querySelectorAll('.urgency-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

async function submitOrder() {
  const customer = document.getElementById('inputCustomer').value.trim();
  const qty = parseFloat(document.getElementById('inputQty').value);
  const note = document.getElementById('inputNote').value.trim();

  if (!customer) { alert('กรุณากรอกชื่อลูกค้า'); return; }
  if (!qty || qty <= 0) { alert('กรุณากรอกจำนวน'); return; }

  const btn = document.querySelector('.btn-confirm');
  btn.textContent = '⏳ กำลังส่ง...';
  btn.disabled = true;

  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({
        action: 'newOrder',
        code: selectedCode,
        name: selectedName,
        customer, qty, urgency: selectedUrgency, note,
        date: new Date().toLocaleDateString('th-TH')
      })
    });
    closeModalDirect();
    showToast('✅ ส่งคำสั่งซื้อแล้ว รอ admin ยืนยัน');
  } catch(e) {
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
  }

  btn.textContent = '✅ ยืนยันสั่งสินค้า';
  btn.disabled = false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadData();
</script>
</body>
</html>
