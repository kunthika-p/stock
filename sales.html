<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>สั่งสินค้า — STIC</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#222;font-size:16px}

/* Header */
.header{background:linear-gradient(135deg,#1a3a5c,#2563a8);color:white;padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;opacity:.8;margin-top:2px}

/* Search */
.search-bar{padding:12px 16px;background:white;border-bottom:1px solid #e0e0e0;position:sticky;top:62px;z-index:99}
.search-bar input{width:100%;padding:10px 14px;border:1.5px solid #d1d5db;border-radius:24px;font-size:15px;font-family:'Sarabun',sans-serif;outline:none}
.search-bar input:focus{border-color:#2563a8}

/* Filter tabs */
.filter-wrap{overflow-x:auto;padding:10px 16px;background:white;border-bottom:1px solid #e0e0e0;white-space:nowrap}
.filter-btn{display:inline-block;padding:6px 14px;border:1.5px solid #d1d5db;border-radius:20px;font-size:13px;font-family:'Sarabun',sans-serif;background:white;color:#555;margin-right:6px;cursor:pointer}
.filter-btn.active{background:#1a3a5c;color:white;border-color:#1a3a5c}

/* Product list */
.product-list{padding:12px 16px}
.product-card{background:white;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;gap:10px}
.product-info{flex:1;min-width:0}
.product-code{font-size:11px;color:#888;font-family:monospace}
.product-name{font-size:15px;font-weight:600;color:#1a3a5c;margin:2px 0;line-height:1.3}
.product-type{font-size:12px;color:#666}
.btn-order{background:#2563a8;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-family:'Sarabun',sans-serif;font-weight:600;cursor:pointer;white-space:nowrap;min-width:70px}
.btn-order:active{background:#1a3a5c}

.empty{text-align:center;color:#aaa;padding:40px;font-size:15px}
.loading{text-align:center;color:#888;padding:40px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.modal-code{font-size:12px;color:#888;font-family:monospace;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:14px;font-weight:600;color:#374151;margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 13px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;font-family:'Sarabun',sans-serif;outline:none}
.field input:focus,.field select:focus{border-color:#2563a8}
.urgency-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.urgency-opt{padding:10px 6px;border:1.5px solid #d1d5db;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.urgency-opt.sel-normal{background:#d1fae5;border-color:#16a34a;color:#065f46}
.urgency-opt.sel-medium{background:#fef9c3;border-color:#d97706;color:#92400e}
.urgency-opt.sel-urgent{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.urgency-opt.selected{opacity:1}
.urgency-opt:not(.selected){opacity:.5}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-cancel{flex:1;padding:13px;border:1.5px solid #d1d5db;border-radius:8px;background:white;font-size:15px;font-family:'Sarabun',sans-serif;cursor:pointer;color:#555}
.btn-confirm{flex:2;padding:13px;border:none;border-radius:8px;background:#2563a8;color:white;font-size:15px;font-family:'Sarabun',sans-serif;font-weight:700;cursor:pointer}
.btn-confirm:active{background:#1a3a5c}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:white;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:999;display:none;white-space:nowrap}
.toast.show{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>🛒 สั่งสินค้า STIC</h1>
  <p>เลือกสินค้าแล้วกดสั่งได้เลย</p>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 ค้นหาสินค้า หรือรหัส..." oninput="filterProducts()">
</div>

<div class="filter-wrap" id="filterWrap">
  <button class="filter-btn active" onclick="setType('all',this)">ทั้งหมด</button>
</div>

<div class="product-list" id="productList">
  <div class="loading">⏳ กำลังโหลดสินค้า...</div>
</div>

<!-- Modal สั่งสินค้า -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalName">ชื่อสินค้า</div>
    <div class="modal-code" id="modalCode">รหัส</div>

    <div class="field">
      <label>ชื่อลูกค้า *</label>
      <input type="text" id="inputCustomer" placeholder="กรอกชื่อลูกค้า">
    </div>

    <div class="field">
      <label>จำนวน (กก.) *</label>
      <input type="number" id="inputQty" placeholder="0" min="1" step="1">
    </div>

    <div class="field">
      <label>ความเร่งด่วน *</label>
      <div class="urgency-opts">
        <div class="urgency-opt sel-normal" onclick="selectUrgency('ปกติ',this)">🟢 ปกติ</div>
        <div class="urgency-opt sel-medium" onclick="selectUrgency('เร่ง',this)">🟡 เร่ง</div>
        <div class="urgency-opt sel-urgent" onclick="selectUrgency('ด่วน',this)">🔴 ด่วน</div>
      </div>
    </div>

    <div class="field">
      <label>หมายเหตุ (ถ้ามี)</label>
      <input type="text" id="inputNote" placeholder="เช่น ส่งที่ไซต์งาน A">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalDirect()">ยกเลิก</button>
      <button class="btn-confirm" onclick="submitOrder()">✅ ยืนยันสั่งสินค้า</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxhXa14EfmWnaCrNZmvDIO_FUSLbp4jzgHiGZABIaT8_CpMc9rh0eDcMvutxxhIbpk/exec";

let allProducts = [];
let currentType = 'all';
let selectedCode = '';
let selectedName = '';
let selectedUrgency = 'ปกติ';

// โหลดสินค้าจาก Apps Script
async function loadProducts() {
  try {
    const res = await fetch(API + '?action=getStock');
    const data = await res.json();
    if (data.items) {
      allProducts = data.items;
      buildTypeFilter();
      filterProducts();
    }
  } catch(e) {
    document.getElementById('productList').innerHTML = '<div class="empty">❌ โหลดสินค้าไม่ได้ กรุณาลองใหม่</div>';
  }
}

function buildTypeFilter() {
  const types = [...new Set(allProducts.map(p => p.type))].filter(Boolean);
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = '<button class="filter-btn active" onclick="setType(\'all\',this)">ทั้งหมด</button>';
  types.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = t;
    btn.onclick = function(){ setType(t, this); };
    wrap.appendChild(btn);
  });
}

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = allProducts;
  if (currentType !== 'all') list = list.filter(p => p.type === currentType);
  if (q) list = list.filter(p =>
    (p.code||'').toLowerCase().includes(q) ||
    (p.name||'').toLowerCase().includes(q) ||
    (p.type||'').toLowerCase().includes(q)
  );

  const el = document.getElementById('productList');
  if (!list.length) {
    el.innerHTML = '<div class="empty">ไม่พบสินค้าที่ค้นหา</div>';
    return;
  }

  el.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-info">
        <div class="product-code">${p.code||''}</div>
        <div class="product-name">${p.name || p.type || '-'}</div>
        <div class="product-type">${p.type||''}</div>
      </div>
      <button class="btn-order" onclick="openModal('${p.code}','${(p.name||p.type||'').replace(/'/g,"\\'")}')">สั่ง</button>
    </div>
  `).join('');
}

function openModal(code, name) {
  selectedCode = code;
  selectedName = name;
  selectedUrgency = 'ปกติ';
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalCode').textContent = 'รหัส: ' + code;
  document.getElementById('inputCustomer').value = '';
  document.getElementById('inputQty').value = '';
  document.getElementById('inputNote').value = '';
  // reset urgency
  document.querySelectorAll('.urgency-opt').forEach(el => el.classList.remove('selected'));
  document.querySelector('.sel-normal').classList.add('selected');
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalBg').classList.remove('open');
}

function selectUrgency(val, el) {
  selectedUrgency = val;
  document.querySelectorAll('.urgency-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

async function submitOrder() {
  const customer = document.getElementById('inputCustomer').value.trim();
  const qty = parseFloat(document.getElementById('inputQty').value);
  const note = document.getElementById('inputNote').value.trim();

  if (!customer) { alert('กรุณากรอกชื่อลูกค้า'); return; }
  if (!qty || qty <= 0) { alert('กรุณากรอกจำนวน'); return; }

  const btn = document.querySelector('.btn-confirm');
  btn.textContent = '⏳ กำลังส่ง...';
  btn.disabled = true;

  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({
        action: 'newOrder',
        code: selectedCode,
        name: selectedName,
        customer: customer,
        qty: qty,
        urgency: selectedUrgency,
        note: note,
        by: customer,
        date: new Date().toLocaleDateString('th-TH')
      })
    });
    closeModalDirect();
    showToast('✅ ส่งคำสั่งซื้อแล้ว รอ admin ยืนยัน');
  } catch(e) {
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
  }

  btn.textContent = '✅ ยืนยันสั่งสินค้า';
  btn.disabled = false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadProducts();
</script>
</body>
</html>
