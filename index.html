<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STIC Stock System</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:linear-gradient(135deg,#1a3a5c,#2563a8);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{text-align:center;color:white;max-width:400px;width:100%}
.logo{font-size:48px;margin-bottom:16px}
h1{font-size:26px;font-weight:700;margin-bottom:6px}
.sub{font-size:14px;opacity:.75;margin-bottom:40px}
.btn-card{display:block;background:white;border-radius:16px;padding:24px 20px;margin-bottom:16px;text-decoration:none;color:#1a3a5c;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:transform .15s,box-shadow .15s}
.btn-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.25)}
.btn-card .icon{font-size:32px;margin-bottom:8px}
.btn-card .title{font-size:18px;font-weight:700;margin-bottom:4px}
.btn-card .desc{font-size:13px;color:#666}
.footer{margin-top:32px;font-size:12px;opacity:.5}
.company-logo{width:140px;object-fit:contain;margin-bottom:16px}
</style>
</head>
<body>
<div class="container">
  <img src="logo.gif" alt="STIC Logo" class="company-logo">
  <h1>STIC Stock System</h1>
  <p class="sub">แสงไทยอุตสาหกรรม — ระบบสต็อคสินค้าออนไลน์</p>

  <a href="sales_grid.html" class="btn-card">
    <div class="icon">🛒</div>
    <div class="title">สั่งสินค้า</div>
    <div class="desc">สำหรับฝ่ายขาย — เลือกสินค้าและส่งคำสั่งซื้อ</div>
  </a>

  <a href="admin_orders.html" class="btn-card">
    <div class="icon">🏠</div>
    <div class="title">Admin</div>
    <div class="desc">สำหรับผู้ดูแลระบบ — จัดการสต็อคและออเดอร์</div>
  </a>

  <div class="footer">STIC Stock System v4</div>
</div>
</body>
</html>
